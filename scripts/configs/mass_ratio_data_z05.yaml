stack:
  redshift: 0.47
  load_field: true
  save_field: true

  stack_field: false # If false, stacks maps instead of fields
  rad_distance: 1.0 # in arcmin, or comoving kpc/h if stack_field is true
  min_radius: 1.0 # in rad_distance units
  max_radius: 6.0 # in rad_distance units
  num_radii: 11 # Number of radial bins between min_radius and max_radius
  
  mask_haloes: false
  mask_radii: 3.0 # Number of virial radii to mask out for haloes. In units of R200c

  pixel_size: 0.2 # in arcmin if stack_field is false
  n_pixels: 1000 # Number of pixels on a side if stack_field is true
  projection: 'yz' # 'xy', 'xz', 'yz'

  filter_type: 'DSigma' # Options: 'CAP', 'cumulative', 'DSigma', 'upsilon'
  particle_type: 'ionized_gas' # 'DM', 'gas', 'stars', 'total', 'ionized_gas'
  filter_type_2: 'DSigma' # Options: 'CAP', 'cumulative', 'DSigma', 'upsilon'
  particle_type_2: 'total'

  subtract_mean: false # Whether to subtract the mean of the field before stacking
  use_subhalos: true # Whether to use subhalos instead of host halos for stacking. If true, will select subhalos based on abundance matching to match the number density specified by the user (see below).


plot:
  plot_data: false
  # data_path: '/pscratch/sd/r/rhliu/projects/Weak_lensing/ratio_measurements/specY3_hsc/ratio_specY3_hsc_zbin1_DSigma_ksz_uniformweight.npz'
  data_path: /pscratch/sd/r/rhliu/projects/Weak_lensing/ratio_measurements/spec_Y3/ratio_LRG_full_no_src_with_cluster_mask_zbin1_DSigma_ksz_ggl.npz
  # data_path: '../data/Fig1_Fig8_dr10_allfoot_perbin_dr6_pzbin1.npz'
  # data_label: 'Hadzhiyska 2024 pz1'
  fig_path: '/pscratch/sd/l/lindajin/SimulationStacker/figures/'
  fig_name: 'halos_yz_data'
  fig_type: 'pdf'
  plot_error_bars: true
  sp_ratio_path: '/pscratch/sd/l/lindajin/DH_profile_kSZ_WL/data/Ptot_Pdm_ratio_k_le15.npz' # path to Ptot_Pdm_ratio_k_le15.npz


